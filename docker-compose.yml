version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: prepai_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prepai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prepai"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: prepai_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: prepai_piston
    restart: always
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      - piston_data:/piston
    entrypoint: >
      sh -c "
      node -e \"
        require('nocamel');
        const Package = require('/piston_api/src/package');
        Promise.all([
          Package.get_package('python', '3.12.0').then(p => p.installed || p.install()),
          Package.get_package('node', '20.11.1').then(p => p.installed || p.install())
        ]).then(() => console.log('Runtimes ready.'));
      \" &&
      exec /piston_api/src/docker-entrypoint.sh
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prepai_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      piston:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prepai_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  pgdata:
  qdrant_data:
  piston_data:
